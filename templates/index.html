<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
        h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .clock-in-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }
        .status-text { font-size: 16px; color: #666; }
        .status-text strong { color: #333; }
        .time-display { font-size: 13px; color: #999; }
        .session-count { font-size: 13px; color: #999; margin-top: -8px; }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 14px 48px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            min-width: 200px;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-success:hover { background: #73d13d; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-danger:hover { background: #ff7875; }
        .btn-default { background: #f5f5f5; color: #333; border: 1px solid #d9d9d9; }
        .btn-default:hover { background: #e8e8e8; }
        .btn-sm { padding: 6px 16px; font-size: 13px; min-width: auto; border-radius: 6px; }

        .hours-badge {
            display: inline-block;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 6px 16px;
            color: #52c41a;
            font-size: 14px;
        }
        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 8px 24px rgba(0,0,0,.15);
        }
        .modal h2 { font-size: 20px; margin-bottom: 12px; }
        .modal p { color: #666; font-size: 14px; margin-bottom: 16px; }
        .modal label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
        }
        .modal input:focus, .modal textarea:focus {
            outline: none; border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.2);
        }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .form-row { display: flex; gap: 12px; }
        .modal .form-row > div { flex: 1; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions .btn { padding: 8px 24px; font-size: 14px; min-width: auto; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
            background: #f0f2f5;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: transparent;
            color: #666;
            transition: all .2s;
        }
        .tab.active { background: #1890ff; color: #fff; }
        .tab:hover:not(.active) { background: #e6f7ff; }

        .chart-container { position: relative; height: 280px; }

        /* Summary */
        .summary-list { margin-top: 16px; }
        .day-group { margin-bottom: 12px; }
        .day-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; font-size: 14px; font-weight: 600; color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .session-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0 8px 16px; gap: 12px;
            border-bottom: 1px solid #f5f5f5;
        }
        .session-item:last-child { border-bottom: none; }
        .session-times { font-size: 13px; color: #888; white-space: nowrap; min-width: 90px; }
        .session-text { flex: 1; font-size: 13px; color: #555; line-height: 1.4; }
        .session-hours { font-size: 13px; color: #52c41a; white-space: nowrap; min-width: 50px; text-align: right; }

        .no-data { text-align: center; color: #999; padding: 40px 0; font-size: 14px; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #666; }
        .user-info .username { font-weight: 600; color: #333; }
        .avatar-wrap {
            width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
            cursor: pointer; flex-shrink: 0; border: 2px solid #e8e8e8;
            background: #f5f5f5; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-wrap .avatar-placeholder { font-size: 16px; color: #bbb; }
        .avatar-wrap:hover { border-color: #1890ff; }
        .avatar-upload-input { display: none; }
        .logout-btn {
            background: none; border: 1px solid #d9d9d9; border-radius: 6px;
            padding: 4px 12px; font-size: 13px; cursor: pointer; color: #666;
        }
        .logout-btn:hover { border-color: #ff4d4f; color: #ff4d4f; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: #333; color: #fff;
            padding: 10px 24px; border-radius: 8px;
            font-size: 14px; z-index: 2000;
            opacity: 0; transition: opacity .3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #ff4d4f; }

        /* Main tabs */
        .main-tabs {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .main-tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            border: none; background: #fff; color: #666;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            transition: all .2s;
        }
        .main-tab.active { background: #1890ff; color: #fff; }
        .main-tab:hover:not(.active) { background: #e6f7ff; }

        .sub-tabs {
            display: flex; gap: 6px; margin-bottom: 16px;
            background: #f0f2f5; border-radius: 8px; padding: 3px;
        }
        .sub-tab {
            flex: 1; padding: 8px; text-align: center; cursor: pointer;
            border-radius: 6px; font-size: 13px; font-weight: 500;
            border: none; background: transparent; color: #666;
            transition: all .2s;
        }
        .sub-tab.active { background: #fff; color: #333; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .sub-tab:hover:not(.active) { background: #e6f7ff; }

        /* Exercise */
        .exe-form-row {
            display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: flex-end;
        }
        .exe-form-row .field { display: flex; flex-direction: column; gap: 4px; }
        .exe-form-row .field label { font-size: 12px; color: #888; font-weight: 500; }
        .exe-form-row input, .exe-form-row select {
            border: 1px solid #d9d9d9; border-radius: 6px; padding: 7px 10px; font-size: 13px;
        }
        .exe-form-row input:focus, .exe-form-row select:focus {
            outline: none; border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.2);
        }
        .exe-list .exe-day { margin-bottom: 14px; }
        .exe-list .exe-day-header {
            font-size: 14px; font-weight: 600; color: #333;
            border-bottom: 1px solid #f0f0f0; padding: 6px 0; margin-bottom: 6px;
        }
        .exe-item {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 0 6px 12px; border-bottom: 1px solid #f5f5f5;
        }
        .exe-item:last-child { border-bottom: none; }
        .exe-time { font-size: 12px; color: #888; white-space: nowrap; min-width: 80px; }
        .exe-type {
            display: inline-block; background: #e6f7ff; color: #1890ff;
            border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 500;
        }
        .exe-notes { font-size: 13px; color: #555; flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ 打卡系统</h1>
            <div class="user-info">
                <div class="avatar-wrap" id="avatarWrap" onclick="document.getElementById('avatarInput').click()" title="点击更换头像">
                    <span class="avatar-placeholder" id="avatarPlaceholder">👤</span>
                    <img id="avatarImg" style="display:none;" alt="头像">
                </div>
                <input type="file" id="avatarInput" class="avatar-upload-input" accept="image/png,image/jpeg,image/gif,image/webp" onchange="uploadAvatar(this)">
                <span><span class="username" id="usernameDisplay">用户</span></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>

        <!-- 打卡区域 -->
        <div class="card">
            <div class="clock-in-area">
                <div class="status-text" id="statusText">加载中...</div>
                <div class="time-display" id="timeDisplay"></div>
                <button class="btn btn-primary" id="mainBtn" onclick="handleMainAction()">开始工作</button>
                <div id="todayHours" style="display:none;">
                    <span class="hours-badge">今日累计: <span id="todayHoursValue">0</span> 小时</span>
                </div>
                <div class="session-count" id="sessionCount"></div>
                <div class="action-row">
                    <button class="btn btn-default btn-sm" onclick="openBackfillModal()">📝 补录</button>
                </div>
            </div>
        </div>

        <!-- 主标签栏 -->
        <div class="main-tabs">
            <button class="main-tab active" data-tab="hours">📊 工时统计</button>
            <button class="main-tab" data-tab="records">📋 记录</button>
            <button class="main-tab" data-tab="plans">📝 计划</button>
            <button class="main-tab" data-tab="exercise">🏃 运动</button>
        </div>

        <!-- 内容区域 -->
        <div class="card">
            <!-- 工时统计 -->
            <div id="hoursSection">
                <div class="sub-tabs">
                    <button class="sub-tab active" data-tab="daily">每日</button>
                    <button class="sub-tab" data-tab="weekly">每周</button>
                    <button class="sub-tab" data-tab="monthly">每月</button>
                    <button class="sub-tab" data-tab="yearly">每年</button>
                </div>
                <div class="chart-container">
                    <canvas id="hoursChart"></canvas>
                </div>
                <div id="summaryList" class="summary-list"></div>
            </div>

            <!-- 记录 -->
            <div id="recordsSection" style="display:none;">
                <div id="recordsList" class="summary-list"></div>
            </div>

            <!-- 计划 -->
            <div id="plansSection" style="display:none;">
                <div class="exe-form-row">
                    <div class="field" style="flex:1;">
                        <input type="text" id="planTitleInput" placeholder="计划名称">
                    </div>
                    <div class="field">
                        <input type="date" id="planDeadlineInput">
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="addPlan()">添加</button>
                </div>
                <div id="plansList"></div>
            </div>

            <!-- 运动记录 -->
            <div id="exerciseSection" style="display:none;">
                <div class="exe-form-row">
                    <div class="field">
                        <label>日期</label>
                        <input type="date" id="exeDate">
                    </div>
                    <div class="field">
                        <label>开始</label>
                        <input type="time" id="exeStart" value="08:00">
                    </div>
                    <div class="field">
                        <label>结束</label>
                        <input type="time" id="exeEnd">
                    </div>
                    <div class="field">
                        <label>项目</label>
                        <select id="exeType" onchange="toggleExeCustomType()">
                            <option>跑步</option>
                            <option>游泳</option>
                            <option>骑行</option>
                            <option>健身</option>
                            <option>瑜伽</option>
                            <option>篮球</option>
                            <option>足球</option>
                            <option>羽毛球</option>
                            <option>乒乓球</option>
                            <option>散步</option>
                            <option>其他</option>
                        </select>
                    </div>
                    <div class="field" id="exeCustomField" style="display:none;">
                        <label>自定义项目</label>
                        <input type="text" id="exeCustomType" placeholder="输入运动项目">
                    </div>
                    <div class="field" style="flex:1;">
                        <label>备注</label>
                        <input type="text" id="exeNotes" placeholder="可选备注">
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="addExercise()" style="margin-bottom:0;">添加</button>
                </div>
                <div id="exerciseList" class="exe-list"></div>
            </div>
        </div>
    </div>

    <!-- 下班弹窗 -->
    <div class="modal-overlay" id="summaryModal">
        <div class="modal">
            <h2>结束工作</h2>
            <p>请填写本次工作摘要：</p>
            <textarea id="summaryInput" placeholder="完成了哪些工作？"></textarea>
            <div class="modal-actions">
                <button class="btn btn-default" onclick="submitCheckOut(true)">跳过</button>
                <button class="btn btn-primary" onclick="submitCheckOut(false)">确认结束</button>
            </div>
        </div>
    </div>

    <!-- 补录弹窗 -->
    <div class="modal-overlay" id="backfillModal">
        <div class="modal">
            <h2>📝 补录打卡</h2>
            <p>补填一次工作记录</p>
            <label>日期</label>
            <input type="date" id="backfillDate">
            <div class="form-row">
                <div>
                    <label>开始时间</label>
                    <input type="time" id="backfillIn" value="09:00">
                </div>
                <div>
                    <label>结束时间 <span style="color:#999;font-weight:400;">(可选)</span></label>
                    <input type="time" id="backfillOut">
                </div>
            </div>
            <label>工作摘要</label>
            <textarea id="backfillSummary" placeholder="完成了哪些工作？"></textarea>
            <div class="modal-actions">
                <button class="btn btn-default" onclick="closeModal('backfillModal')">取消</button>
                <button class="btn btn-primary" onclick="submitBackfill()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal" style="max-width:380px;">
            <h2>🗑️ 确认删除</h2>
            <p id="deleteConfirmText">确定要删除这条记录吗？</p>
            <div class="modal-actions">
                <button class="btn btn-default" onclick="closeModal('deleteModal')">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let chart = null;
        let currentMainTab = 'hours';
        let currentSubTab = 'daily';
        let pendingDeleteId = null;
        let statusTimer = null;

        // ---------- Auth ----------
        async function checkAuth() {
            const r = await fetch('/api/me');
            if (!r.ok) { window.location.href = '/login'; return; }
            const d = await r.json();
            document.getElementById('usernameDisplay').textContent = d.username;
            if (d.avatar) {
                document.getElementById('avatarImg').src = d.avatar;
                document.getElementById('avatarImg').style.display = 'block';
                document.getElementById('avatarPlaceholder').style.display = 'none';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        async function apiFetch(url, options = {}) {
            const r = await fetch(url, options);
            if (r.status === 401) { window.location.href = '/login'; return null; }
            return r;
        }

        // ---------- 头像 ----------
        async function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            if (!['image/png','image/jpeg','image/gif','image/webp'].includes(file.type)) {
                showToast('不支持的文件格式', true);
                input.value = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片不能超过 5MB', true);
                input.value = '';
                return;
            }
            const formData = new FormData();
            formData.append('avatar', file);
            const r = await apiFetch('/api/avatar', { method: 'POST', body: formData });
            if (!r) return;
            const d = await r.json();
            input.value = '';
            if (d.success) {
                document.getElementById('avatarImg').src = d.avatar;
                document.getElementById('avatarImg').style.display = 'block';
                document.getElementById('avatarPlaceholder').style.display = 'none';
                showToast('✅ 头像已更新');
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- Toast ----------
        function showToast(msg, isError) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (isError ? ' error' : '');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // ---------- 打卡 ----------
        async function refreshStatus() {
            const res = await apiFetch('/api/status');
            if (!res) return;
            const data = await res.json();
            const statusText = document.getElementById('statusText');
            const timeDisplay = document.getElementById('timeDisplay');
            const mainBtn = document.getElementById('mainBtn');
            const todayHours = document.getElementById('todayHours');
            const sessionCount = document.getElementById('sessionCount');

            if (data.has_open_session) {
                const s = data.open_session;
                statusText.innerHTML = '工作中: 开始于 <strong>' + s.check_in + '</strong>';
                mainBtn.textContent = '🔚 结束工作';
                mainBtn.className = 'btn btn-danger';
                mainBtn.disabled = false;
                todayHours.style.display = 'block';
                document.getElementById('todayHoursValue').textContent = data.today_hours;
                sessionCount.textContent = '今日第 ' + data.sessions_count + ' 次工作';
                timeDisplay.textContent = '进行中 (' + s.current_hours + ' 小时)';
            } else if (data.checked_in) {
                statusText.innerHTML = '今日工作 ' + data.sessions_count + ' 次，共 <strong>' + data.today_hours + '</strong> 小时';
                mainBtn.textContent = '📌 开始工作';
                mainBtn.className = 'btn btn-success';
                mainBtn.disabled = false;
                todayHours.style.display = 'block';
                document.getElementById('todayHoursValue').textContent = data.today_hours;
                sessionCount.textContent = '所有工作已结束';
                timeDisplay.textContent = '';
            } else {
                statusText.innerHTML = '今日尚未打卡';
                timeDisplay.textContent = '';
                mainBtn.textContent = '📌 开始工作';
                mainBtn.className = 'btn btn-primary';
                mainBtn.disabled = false;
                todayHours.style.display = 'none';
                sessionCount.textContent = '';
            }
        }

        async function handleMainAction() {
            const btn = document.getElementById('mainBtn');
            if (btn.disabled) return;

            // 先查状态
            const res = await apiFetch('/api/status');
            if (!res) return;
            const data = await res.json();

            if (data.has_open_session) {
                // 有进行中的工作 → 点击结束
                openModal('summaryModal');
                document.getElementById('summaryInput').value = '';
                setTimeout(() => document.getElementById('summaryInput').focus(), 100);
            } else {
                // 没进行中的工作 → 开始
                const r = await apiFetch('/api/check_in', { method: 'POST' });
                if (!r) return;
                const d = await r.json();
                if (d.success) {
                    showToast('✅ 开始工作！' + d.time);
                    refreshStatus();
                    renderChart(currentSubTab);
                } else {
                    showToast('❌ ' + d.message, true);
                }
            }
        }

        async function submitCheckOut(skipSummary) {
            const summary = skipSummary ? '' : document.getElementById('summaryInput').value.trim();
            closeModal('summaryModal');
            const r = await apiFetch('/api/check_out', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ summary }),
            });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                showToast('✅ 结束工作！本次 ' + d.hours + ' 小时');
                refreshStatus();
                renderChart(currentSubTab);
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- 补录 ----------
        function openBackfillModal() {
            const now = new Date();
            const beijing = new Date(now.getTime() + 8 * 3600000);
            document.getElementById('backfillDate').value = beijing.toISOString().split('T')[0];
            document.getElementById('backfillOut').value = '';
            openModal('backfillModal');
        }

        async function submitBackfill() {
            const date = document.getElementById('backfillDate').value;
            const check_in = document.getElementById('backfillIn').value;
            const check_out = document.getElementById('backfillOut').value;
            const summary = document.getElementById('backfillSummary').value.trim();

            if (!date || !check_in) {
                showToast('请填写日期和开始时间', true);
                return;
            }

            const r = await apiFetch('/api/backfill', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, check_in, check_out: check_out || null, summary }),
            });
            if (!r) return;
            const d = await r.json();
            closeModal('backfillModal');

            if (d.success) {
                const h = d.hours ? ` (${d.hours} 小时)` : '';
                showToast(`✅ ${date} 补录成功${h}`);
                refreshStatus();
                renderChart(currentSubTab);
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- 删除 ----------
        function requestDelete(id, label) {
            pendingDeleteId = id;
            document.getElementById('deleteConfirmText').textContent =
                `确定要删除这条记录吗？`;
            openModal('deleteModal');
        }

        async function confirmDelete() {
            if (!pendingDeleteId) return;
            closeModal('deleteModal');

            const r = await apiFetch(`/api/records/${pendingDeleteId}`, { method: 'DELETE' });
            if (!r) return;
            const d = await r.json();
            pendingDeleteId = null;

            if (d.success) {
                showToast('✅ 记录已删除');
                refreshStatus();
                renderChart(currentSubTab);
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- 图表 ----------
        function switchMainTab(tab) {
            currentMainTab = tab;
            document.querySelectorAll('.main-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            document.getElementById('hoursSection').style.display = tab === 'hours' ? 'block' : 'none';
            document.getElementById('recordsSection').style.display = tab === 'records' ? 'block' : 'none';
            document.getElementById('plansSection').style.display = tab === 'plans' ? 'block' : 'none';
            document.getElementById('exerciseSection').style.display = tab === 'exercise' ? 'block' : 'none';

            if (tab === 'hours') {
                switchSubTab(currentSubTab);
            } else if (tab === 'records') {
                loadRecordsView();
            } else if (tab === 'plans') {
                loadPlans();
            } else if (tab === 'exercise') {
                setDefaultExeDate();
                loadExercises();
            }
        }

        function switchSubTab(tab) {
            currentSubTab = tab;
            document.querySelectorAll('.sub-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            renderChart(tab);
        }

        async function renderChart(tab) {
            const ctx = document.getElementById('hoursChart').getContext('2d');
            const summaryContainer = document.getElementById('summaryList');

            let endpoint, color;
            if (tab === 'daily') { endpoint = '/api/hours/daily'; color = '#1890ff'; }
            else if (tab === 'weekly') { endpoint = '/api/hours/weekly'; color = '#52c41a'; }
            else if (tab === 'monthly') { endpoint = '/api/hours/monthly'; color = '#722ed1'; }
            else if (tab === 'yearly') { endpoint = '/api/hours/yearly'; color = '#eb2f96'; }

            const res = await apiFetch(endpoint);
            if (!res) return;
            const data = await res.json();

            if (chart) chart.destroy();

            const chartData = data.map(d => d.total_hours !== undefined ? d.total_hours : d.hours);
            const chartLabels = data.map(d => d.label || d.range);

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '小时',
                        data: chartData,
                        backgroundColor: color + 'cc',
                        borderColor: color,
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => ctx.parsed.y + ' 小时'
                                    + (data[ctx.dataIndex].days !== undefined
                                        ? ' (' + data[ctx.dataIndex].days + ' 天)' : '')
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: '小时' }, ticks: { callback: v => v + 'h' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 摘要信息
            if (tab === 'daily') {
                const items = data.filter(d => d.sessions && d.sessions.length > 0);
                if (items.length === 0) {
                    summaryContainer.innerHTML = '<div class="no-data">本周暂无打卡记录</div>';
                } else {
                    let html = '';
                    items.forEach(d => {
                        html += '<div class="day-group">';
                        html += '<div class="day-header">' +
                            '<span>' + d.label + '</span>' +
                            '<span style="color:#52c41a;">共 ' + d.total_hours.toFixed(2) + 'h</span>' +
                            '</div>';
                        d.sessions.forEach(s => {
                            const times = s.check_out
                                ? s.check_in + ' - ' + s.check_out
                                : s.check_in + ' (进行中)';
                            html += '<div class="session-item">' +
                                '<div class="session-times">' + times + '</div>' +
                                '<div class="session-text">' + (s.summary || '—') + '</div>' +
                                '<div class="session-hours">' + s.hours.toFixed(2) + 'h</div>' +
                                '<button class="logout-btn" style="padding:2px 6px;font-size:12px;" onclick="requestDelete(' + s.id + ')">✕</button>' +
                                '</div>';
                        });
                        html += '</div>';
                    });
                    summaryContainer.innerHTML = html;
                }
            } else {
                const totalHours = data.reduce((s, d) => s + (d.hours || d.total_hours || 0), 0);
                const daysWorked = data.reduce((s, d) => s + (d.days || 0), 0);
                const nonZero = data.filter(d => (d.hours || d.total_hours || 0) > 0).length;
                let info = `<div class="no-data">总计 ${totalHours.toFixed(2)} 小时`;
                if (daysWorked) info += `，出勤 ${daysWorked} 天`;
                const periodName = { weekly: '周', monthly: '月', yearly: '年' }[tab] || '期';
                if (nonZero) info += `，平均 ${(totalHours / nonZero).toFixed(2)} 小时/${periodName}`;
                info += '</div>';
                summaryContainer.innerHTML = info;
            }
        }

        // ---------- 记录 ----------
        async function loadRecordsView() {
            const r = await apiFetch('/api/records/all');
            if (!r) return;
            const data = await r.json();
            const container = document.getElementById('recordsList');
            if (data.length === 0) {
                container.innerHTML = '<div class="no-data">暂无打卡记录</div>';
                return;
            }
            let html = '';
            const weekdayMap = ['周日','周一','周二','周三','周四','周五','周六'];
            data.forEach(d => {
                const dObj = new Date(d.date + 'T00:00:00+08:00');
                const label = d.date + ' ' + weekdayMap[dObj.getDay()];
                html += '<div class="day-group">';
                html += '<div class="day-header">' +
                    '<span>' + label + '</span>' +
                    '<span style="color:#52c41a;">共 ' + d.total_hours.toFixed(2) + 'h</span>' +
                    '</div>';
                d.sessions.forEach(s => {
                    const times = s.check_out
                        ? s.check_in + ' - ' + s.check_out
                        : s.check_in + ' (未结束)';
                    html += '<div class="session-item">' +
                        '<div class="session-times">' + times + '</div>' +
                        '<div class="session-text">' + (s.summary || '—') + '</div>' +
                        '<div class="session-hours">' + s.hours.toFixed(2) + 'h</div>' +
                        '<button class="logout-btn" style="padding:2px 6px;font-size:12px;" onclick="requestDelete(' + s.id + ')">✕</button>' +
                        '</div>';
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        // ---------- 工作计划 ----------
        async function loadPlans() {
            const r = await apiFetch('/api/plans');
            if (!r) return;
            const plans = await r.json();
            const container = document.getElementById('plansList');
            if (plans.length === 0) {
                container.innerHTML = '<div class="no-data">暂无工作计划</div>';
                return;
            }
            let html = '';
            plans.forEach(p => {
                const statusClass = p.completed ? 'hours-badge' : 'session-hours';
                const statusText = p.completed ? '✅ 已完成' : '进行中';
                const deadlineHtml = p.deadline ? `<span style="color:#999;font-size:12px;margin-left:8px;">截止 ${p.deadline}</span>` : '';
                html += '<div class="session-item" style="' + (p.completed ? 'opacity:.6;' : '') + '">' +
                    '<div style="flex:1;">' +
                    '<span style="font-weight:500;">' + p.title + '</span>' +
                    deadlineHtml +
                    '</div>' +
                    '<span class="' + statusClass + '" style="font-size:12px;padding:2px 10px;">' + statusText + '</span>' +
                    '<button class="logout-btn" style="padding:2px 8px;font-size:12px;" onclick="togglePlan(' + p.id + ',' + (p.completed ? 'false' : 'true') + ')">' + (p.completed ? '撤销' : '完成') + '</button>' +
                    '<button class="logout-btn" style="padding:2px 8px;font-size:12px;margin-left:4px;" onclick="deletePlan(' + p.id + ')">✕</button>' +
                    '</div>';
            });
            container.innerHTML = html;
        }

        async function addPlan() {
            const title = document.getElementById('planTitleInput').value.trim();
            const deadline = document.getElementById('planDeadlineInput').value;
            if (!title) { showToast('请输入计划名称', true); return; }
            const r = await apiFetch('/api/plans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, deadline: deadline || null }),
            });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                document.getElementById('planTitleInput').value = '';
                document.getElementById('planDeadlineInput').value = '';
                showToast('✅ 计划已添加');
                loadPlans();
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        async function togglePlan(id, completed) {
            const r = await apiFetch('/api/plans/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ completed }),
            });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                showToast(completed ? '✅ 计划已完成' : '已撤销完成');
                loadPlans();
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        async function deletePlan(id) {
            if (!confirm('确定要删除这个计划吗？')) return;
            const r = await apiFetch('/api/plans/' + id, { method: 'DELETE' });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                showToast('✅ 计划已删除');
                loadPlans();
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- 运动记录 ----------
        function setDefaultExeDate() {
            const now = new Date();
            const beijing = new Date(now.getTime() + 8 * 3600000);
            document.getElementById('exeDate').value = beijing.toISOString().split('T')[0];
        }

        async function loadExercises() {
            const r = await apiFetch('/api/exercises');
            if (!r) return;
            const data = await r.json();
            const container = document.getElementById('exerciseList');
            const keys = Object.keys(data);
            if (keys.length === 0) {
                container.innerHTML = '<div class="no-data">暂无运动记录</div>';
                return;
            }
            let html = '';
            keys.forEach(date => {
                html += '<div class="exe-day"><div class="exe-day-header">' + date + '</div>';
                data[date].forEach(e => {
                    const timeRange = e.end_time ? e.start_time + ' - ' + e.end_time : e.start_time + ' (进行中)';
                    html += '<div class="exe-item">' +
                        '<span class="exe-time">' + timeRange + '</span>' +
                        '<span class="exe-type">' + e.exercise_type + '</span>' +
                        '<span class="exe-notes">' + (e.notes || '') + '</span>' +
                        '<button class="logout-btn" style="padding:2px 6px;font-size:12px;" onclick="deleteExercise(' + e.id + ')">✕</button>' +
                        '</div>';
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function toggleExeCustomType() {
            const sel = document.getElementById('exeType');
            document.getElementById('exeCustomField').style.display = sel.value === '其他' ? 'block' : 'none';
        }

        async function addExercise() {
            const date = document.getElementById('exeDate').value;
            const start_time = document.getElementById('exeStart').value;
            const end_time = document.getElementById('exeEnd').value;
            let exercise_type = document.getElementById('exeType').value;
            const notes = document.getElementById('exeNotes').value.trim();

            if (exercise_type === '其他') {
                const custom = document.getElementById('exeCustomType').value.trim();
                if (custom) exercise_type = custom;
            }

            if (!date || !start_time || !end_time || !exercise_type) {
                showToast('请填写日期、开始时间、结束时间和运动项目', true);
                return;
            }

            const r = await apiFetch('/api/exercises', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, start_time, end_time, exercise_type, notes }),
            });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                document.getElementById('exeEnd').value = '';
                document.getElementById('exeNotes').value = '';
                showToast('✅ 运动记录已添加');
                loadExercises();
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        async function deleteExercise(id) {
            if (!confirm('确定要删除这条运动记录吗？')) return;
            const r = await apiFetch('/api/exercises/' + id, { method: 'DELETE' });
            if (!r) return;
            const d = await r.json();
            if (d.success) {
                showToast('✅ 运动记录已删除');
                loadExercises();
            } else {
                showToast('❌ ' + d.message, true);
            }
        }

        // ---------- 初始化 ----------
        async function init() {
            await checkAuth();

            // 主标签切换
            document.querySelectorAll('.main-tab').forEach(el => {
                el.onclick = () => switchMainTab(el.dataset.tab);
                el.style.cursor = 'pointer';
            });

            // 子标签切换（工时统计）
            document.querySelectorAll('.sub-tab').forEach(el => {
                el.onclick = () => switchSubTab(el.dataset.tab);
                el.style.cursor = 'pointer';
            });

            // 遮罩关闭
            document.querySelectorAll('.modal-overlay').forEach(el => {
                el.addEventListener('click', e => {
                    if (e.target === el) el.classList.remove('active');
                });
            });

            // 回车添加运动
            document.getElementById('exeNotes').addEventListener('keydown', e => {
                if (e.key === 'Enter') addExercise();
            });
            // 计划名称回车添加
            document.getElementById('planTitleInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') addPlan();
            });

            // 定时刷新
            statusTimer = setInterval(async () => {
                const r = await apiFetch('/api/status');
                if (!r) return;
                const d = await r.json();
                if (d.has_open_session || d.checked_in) {
                    document.getElementById('todayHoursValue').textContent = d.today_hours;
                }
                if (d.has_open_session) {
                    document.getElementById('timeDisplay').textContent =
                        '进行中 (' + d.open_session.current_hours + ' 小时)';
                }
            }, 30000);

            await refreshStatus();
            // 默认显示工时统计-每日
            switchMainTab('hours');
            switchSubTab('daily');
        }

        init();
    </script>
</body>
</html>
